<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ZeinaGuard | Enterprise WIPS</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.2/css/all.min.css">
    <link href="https://fonts.googleapis.com/css2?family=Chakra+Petch:wght@400;700&family=Inter:wght@300;400;600&display=swap" rel="stylesheet">
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    
    <style>
        :root { --sidebar-w: 280px; --primary: #2563eb; --rogue: #dc2626; --safe: #059669; --wait: #d97706; --dark-bg: #0f172a; }
        body { font-family: 'Inter', sans-serif; background-color: #f1f5f9; color: #1e293b; }
        
        /* تنسيق القائمة الجانبية */
        .sidebar { width: var(--sidebar-w); height: 100vh; position: fixed; background: var(--dark-bg); color: #94a3b8; display: flex; flex-direction: column; }
        .brand-box { padding: 25px; background: rgba(0,0,0,0.2); font-family: 'Chakra Petch', sans-serif; border-bottom: 1px solid #1e293b; }
        .brand-text { font-size: 1.5rem; font-weight: 700; color: #fff; }
        
        .nav-links { padding: 20px 15px; flex-grow: 1; }
        .nav-btn { display: flex; align-items: center; padding: 12px 15px; color: #cbd5e1; text-decoration: none; border-radius: 8px; margin-bottom: 5px; transition: 0.2s; }
        .nav-btn:hover, .nav-btn.active { background: #334155; color: #fff; border-left: 4px solid var(--primary); }
        .nav-btn i { width: 25px; margin-right: 10px; }

        /* تنسيق المحتوى الرئيسي */
        .main { margin-left: var(--sidebar-w); padding: 30px; }
        .hud-grid { display: grid; grid-template-columns: repeat(4, 1fr); gap: 20px; margin-bottom: 30px; }
        .hud-card { background: #fff; border-radius: 12px; padding: 20px; border: 1px solid #e2e8f0; }
        .hud-val { font-size: 2rem; font-weight: 800; font-family: 'Chakra Petch', sans-serif; }
        .hud-label { font-size: 0.75rem; font-weight: 700; text-transform: uppercase; color: #64748b; }

        /* تنسيق الجدول */
        .table-panel { background: #fff; border-radius: 12px; border: 1px solid #e2e8f0; overflow: hidden; }
        .custom-table { width: 100%; border-collapse: collapse; }
        .custom-table th { background: #f8fafc; padding: 15px; text-align: left; font-size: 0.75rem; color: #64748b; text-transform: uppercase; }
        .custom-table td { padding: 15px; border-top: 1px solid #f1f5f9; font-size: 0.9rem; }
        
        .status-badge { padding: 5px 12px; border-radius: 50px; font-size: 0.75rem; font-weight: 700; }
        .bg-rogue { background: #fee2e2; color: #991b1b; }
        .bg-safe { background: #d1fae5; color: #065f46; }
        .bg-wait { background: #fef3c7; color: #92400e; }
    </style>
</head>
<body>
    <div class="sidebar">
        <div class="brand-box"><div class="brand-text">ZEINA<span style="color: var(--primary)">GUARD</span></div></div>
        <div class="nav-links">
            <a href="#" class="nav-btn active"><i class="fas fa-radar"></i> Threat Monitor</a>
            <a href="#" class="nav-btn"><i class="fas fa-network-wired"></i> Sensors</a>
            <a href="#" class="nav-btn"><i class="fas fa-history"></i> Activity Logs</a>
            <a href="#" class="nav-btn"><i class="fas fa-shield-halved"></i> Security Policy</a>
        </div>
        <div id="sensor-status" class="p-4 mt-auto">
            </div>
    </div>

    <div class="main">
        <div class="d-flex justify-content-between align-items-center mb-4">
            <h2 style="font-weight: 700;">Security Operations Center</h2>
            <div id="clock" class="badge bg-white text-dark border p-2 px-3 shadow-sm">00:00:00</div>
        </div>

        <div class="hud-grid">
            <div class="hud-card" style="border-left: 5px solid var(--rogue);">
                <div class="hud-label">Threats Detected</div>
                <div class="hud-val text-danger" id="kpi-rogue">0</div>
            </div>
            <div class="hud-card" style="border-left: 5px solid var(--wait);">
                <div class="hud-label">Pending Review</div>
                <div class="hud-val text-warning" id="kpi-wait">0</div>
            </div>
            <div class="hud-card" style="border-left: 5px solid var(--safe);">
                <div class="hud-label">Secured Assets</div>
                <div class="hud-val text-success" id="kpi-safe">0</div>
            </div>
            <div class="hud-card" style="border-left: 5px solid var(--primary);">
                <div class="hud-label">Total Traffic</div>
                <div class="hud-val text-primary" id="kpi-total">0</div>
            </div>
        </div>

        <div class="row g-4">
            <div class="col-lg-8">
                <div class="table-panel">
                    <div class="p-3 border-bottom fw-bold bg-light">Live Signals Analysis</div>
                    <table class="custom-table">
                        <thead>
                            <tr>
                                <th>Status</th>
                                <th>Network (SSID/MAC)</th>
                                <th>Risk Score</th>
                                <th>Channel</th>
                                <th>Actions</th>
                            </tr>
                        </thead>
                        <tbody id="table-body">
                            </tbody>
                    </table>
                </div>
            </div>
            <div class="col-lg-4">
                <div class="hud-card">
                    <div class="fw-bold mb-3">Spectrum Density</div>
                    <canvas id="spectrumChart"></canvas>
                </div>
            </div>
        </div>
    </div>

    <script>
        // تحديث الساعة لايف
        setInterval(() => document.getElementById('clock').innerText = new Date().toLocaleTimeString(), 1000);

        // وظيفة جلب البيانات من السيرفر
        async function updateDashboard() {
            try {
                const response = await fetch('/api/data');
                const data = await response.json();

                // تحديث العدادات
                document.getElementById('kpi-rogue').innerText = data.stats.rogue;
                document.getElementById('kpi-wait').innerText = data.stats.waiting;
                document.getElementById('kpi-safe').innerText = data.stats.authorized;
                document.getElementById('kpi-total').innerText = data.stats.total;

                // تحديث الجدول
                const tbody = document.getElementById('table-body');
                tbody.innerHTML = '';
                data.aps.forEach(ap => {
                    const badgeClass = ap.status === 'Rogue' ? 'bg-rogue' : (ap.status === 'Authorized' ? 'bg-safe' : 'bg-wait');
                    tbody.innerHTML += `
                        <tr>
                            <td><span class="status-badge ${badgeClass}">${ap.status}</span></td>
                            <td>
                                <div class="fw-bold">${ap.ssid || 'Hidden'}</div>
                                <small class="text-muted">${ap.mac}</small>
                            </td>
                            <td class="fw-bold text-${ap.risk_score > 70 ? 'danger' : 'dark'}">${ap.risk_score}%</td>
                            <td>CH ${ap.channel}</td>
                            <td>
                                ${ap.status === 'Waiting' ? `
                                    <button class="btn btn-sm btn-outline-success" onclick="updateStatus('${ap.mac}', 'Authorized')"><i class="fas fa-check"></i></button>
                                    <button class="btn btn-sm btn-outline-danger" onclick="updateStatus('${ap.mac}', 'Rogue')"><i class="fas fa-ban"></i></button>
                                ` : '<i class="fas fa-lock text-muted"></i>'}
                            </td>
                        </tr>
                    `;
                });

                // تحديث قائمة السنسورات
                const sensorBox = document.getElementById('sensor-status');
                sensorBox.innerHTML = '<small class="text-uppercase fw-bold text-muted d-block mb-2">Active Sensors</small>';
                data.sensors.forEach(s => {
                    sensorBox.innerHTML += `
                        <div class="d-flex justify-content-between align-items-center mb-1">
                            <small class="text-white">${s.id}</small>
                            <span class="badge bg-success" style="font-size: 0.5rem;">ONLINE</span>
                        </div>
                    `;
                });

            } catch (err) { console.error("Update failed:", err); }
        }

        // وظيفة تغيير حالة الجهاز يدويًا
        function updateStatus(mac, status) {
            fetch('/api/update', {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ mac: mac, status: status })
            }).then(() => updateDashboard());
        }

        // تشغيل التحديث كل ثانيتين
        setInterval(updateDashboard, 2000);
        updateDashboard();
    </script>
</body>
</html>
